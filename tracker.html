<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker | Budgetly</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="premium-nav">
  <h1>Budgetly</h1>

  <div class="nav-links">
    <a href="home.html">Dashboard</a>
    <a class="active" href="tracker.html">Tracker</a>
    <a href="budget.html">Budget</a>
    <a href="reports.html">Reports</a>
    <a href="index.html">Profile</a>
  </div>

  <div class="nav-profile">
    <div class="nav-avatar" id="navAvatar">👤</div>
    <span id="navName">Student</span>
  </div>
</nav>

<main class="tracker-page">

  <section class="tracker-hero">
    <div>
      <h2>Expense Tracker</h2>
      <p>Add, search, edit, and delete your student expenses in one clean dashboard.</p>
    </div>
  </section>

  <section class="tracker-grid">

    <div class="add-expense-card">
      <h3>Add Expense</h3>

      <div class="tracker-form">
        <label>Amount</label>
        <input id="expenseAmount" type="number" placeholder="₱ 0.00">

        <label>Category</label>
        <select id="expenseCategory">
          <option>Food</option>
          <option>Transport</option>
          <option>School</option>
          <option>Personal</option>
          <option>Others</option>
        </select>

        <label>Date</label>
        <input id="expenseDate" type="date">

        <label>Notes</label>
        <input id="expenseNote" type="text" placeholder="Enter notes...">
      </div>

      <button id="expenseBtn" onclick="saveExpense()">Add Expense</button>
    </div>

<div class="calendar-card">
  <div class="calendar-top">
    <button type="button" onclick="changeMonth(-1)">‹</button>
    <h3 id="calendarTitle">Month Year</h3>
    <button type="button" onclick="changeMonth(1)">›</button>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
</div>
    </div>

  </section>

  <section class="history-card">
    <div class="history-header">
      <div>
        <h3>Transaction History</h3>
        <p>Manage all recorded expenses</p>
      </div>

      <input id="searchExpense" oninput="renderTrackerTable()" type="text" placeholder="Search...">
    </div>

    <table class="expense-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="expenseTableBody"></tbody>
    </table>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
