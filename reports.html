<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | Budgetly</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="premium-nav">
  <h1>Budgetly</h1>

  <div class="nav-links">
    <a href="home.html">Dashboard</a>
    <a href="tracker.html">Tracker</a>
    <a href="budget.html">Budget</a>
    <a class="active" href="reports.html">Reports</a>
    <a href="index.html">Profile</a>
  </div>

  <div class="nav-profile">
    <div class="nav-avatar" id="navAvatar">👤</div>
    <span id="navName">Student</span>
  </div>
</nav>

<main class="reports-page">

  <section class="reports-hero">
    <div>
      <h2>Reports & Analytics</h2>
      <p>Analyze your spending behavior and financial progress.</p>
    </div>

    <button onclick="generateReport()">Generate Report</button>
  </section>

  <section class="reports-stats">
    <div class="report-stat-card">
      <small>Total Expenses</small>
      <h3 id="reportTotalExpenses">₱0</h3>
    </div>

    <div class="report-stat-card">
      <small>Average Daily Spending</small>
      <h3 id="reportAverage">₱0</h3>
    </div>

    <div class="report-stat-card">
      <small>Most Spent Category</small>
      <h3 id="reportTopCategory">None</h3>
    </div>
  </section>

  <section class="reports-grid">
    <div class="report-chart-card">
      <h3>Expenses by Category</h3>
      <canvas id="reportPieChart"></canvas>
    </div>

    <div class="report-chart-card">
      <h3>Expenses Over Time</h3>
      <canvas id="reportBarChart"></canvas>
    </div>
  </section>

  <section class="insights-card">
    <h3>Spending Insights</h3>
    <ul id="spendingInsights"></ul>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
